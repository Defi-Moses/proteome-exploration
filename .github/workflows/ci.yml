name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-tests-and-release-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[parquet]"

      - name: Run unit and integration tests
        run: |
          PYTHONPATH=src python -m unittest -q

      - name: Build fixture release
        run: |
          python scripts/release_phase1.py --label ci-release --output-root /tmp/panccre-releases

      - name: Check release contract
        run: |
          python scripts/check_release_contract.py \
            --release-manifest /tmp/panccre-releases/ci-release/release_manifest.json
