[build]
builder = "NIXPACKS"
buildCommand = "pnpm --filter @panccre/worker build"
watchPatterns = ["/apps/worker/**", "/src/**", "/scripts/**", "/configs/**", "/tests/golden/**", "/pyproject.toml", "/nixpacks.toml"]

[deploy]
startCommand = "PYTHONPATH=/app/src python3 -m panccre.worker.main"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.limitOverride.containers]
cpu = 8
memoryBytes = 68719476736
